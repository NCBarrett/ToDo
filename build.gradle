buildscript {

  //ext.kotlin_version = '1.6.0' // 1.5.1, 1.6.0, 1.7.2

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath 'com.android.tools.build:gradle:7.3.1' // 7.0.2, *7.3.1
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.6.10" // *1.5.21, 1.6.10, 1.7.1
  }
}

task clean(type: Delete) {
  delete rootProject.buildDir
}